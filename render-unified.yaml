services:
  # ============================================================
  # UNIFIED HASHNHEDGE API + MINING POOL SERVER
  # ============================================================
  - type: web
    name: hashnhedge-unified-api
    env: node
    region: oregon
    plan: free
    buildCommand: |
      npm install
      npx prisma generate
      npx prisma migrate deploy
    startCommand: node api/server-unified.js
    healthCheckPath: /api/health
    envVars:
      # ===== Environment =====
      - key: NODE_ENV
        value: production

      # ===== Ports =====
      - key: API_PORT
        value: 10000
      - key: PORT
        value: 10000

      # ===== Database (CRITICAL - Set these in Render Dashboard) =====
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_UNPOOLED
        sync: false

      # ===== Security (Auto-generated by Render) =====
      - key: ADMIN_API_KEY
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true

      # ===== CORS Origins =====
      - key: ALLOWED_ORIGINS
        value: https://hashnhedge.com,https://www.hashnhedge.com,https://hashnhedge-unified-api.onrender.com

      # ===== Pool Configuration =====
      - key: POOL_FEE_AI
        value: "0.30"
      - key: POOL_FEE_MINING
        value: "0.03"
      - key: MIN_PAYOUT
        value: "0.01"

      # ===== Wallet Configuration =====
      - key: OFFICIAL_WALLET_ADDRESS
        sync: false
      - key: SOLANA_NETWORK
        value: mainnet-beta

      # ===== Stack Auth (Optional) =====
      - key: NEXT_PUBLIC_STACK_PROJECT_ID
        sync: false
      - key: NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY
        sync: false
      - key: STACK_SECRET_SERVER_KEY
        sync: false

      # ===== Optional Services =====
      - key: SENDGRID_API_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_S3_BUCKET
        value: hashnhedge-uploads

    autoDeploy: true

  # ============================================================
  # PHONEPROOF MOBILE MINING POOL (SEPARATE SERVICE)
  # ============================================================
  - type: web
    name: phoneproof-pool
    env: node
    region: oregon
    plan: free
    rootDir: armageddon/pool
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: POOL_FEE_MINING
        value: "0.03"
    autoDeploy: true

# ============================================================
# DATABASE (Render PostgreSQL)
# ============================================================
databases:
  - name: hashnhedge-db
    databaseName: hashnhedge_api
    user: hashnhedge_api_user
    plan: free
    region: oregon

# ============================================================
# DEPLOYMENT INSTRUCTIONS
# ============================================================
# 1. Push this file to your repository
# 2. Connect repository to Render
# 3. Render will auto-detect render-unified.yaml
# 4. Set DATABASE_URL in Render dashboard:
#    - Copy from existing database OR
#    - Create new database and copy connection string
# 5. Deploy!
#
# Important Environment Variables to Set Manually:
# - DATABASE_URL
# - DATABASE_URL_UNPOOLED
# - OFFICIAL_WALLET_ADDRESS (your public Solana wallet)
# - STACK_SECRET_SERVER_KEY (if using Stack Auth)
# - SENDGRID_API_KEY (if using email)
# - AWS credentials (if using S3)
