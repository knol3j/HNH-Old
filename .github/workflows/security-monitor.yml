name: Security Vulnerability Monitor

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  security-audit:
    name: NPM Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    strategy:
      matrix:
        project:
          - name: 'Main Project'
            path: '.'
          - name: 'HNH Pool'
            path: './HNH-pool'
          - name: 'Hybrid Pool'
            path: './hybrid-pool'
          - name: 'Armageddon Pool'
            path: './armageddon/pool'
          - name: 'Orchestration API'
            path: './orchestration-api'
          - name: 'Mobile App'
            path: './armageddon/mobile-app'
          - name: 'Vendor Portal'
            path: './hnh-vendor-portal'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ${{ matrix.project.path }}
        run: |
          if [ -f "package.json" ]; then
            npm ci || npm install
          else
            echo "No package.json found, skipping"
            exit 0
          fi

      - name: Run security audit
        working-directory: ${{ matrix.project.path }}
        continue-on-error: true
        run: |
          echo "=== Security Audit for ${{ matrix.project.name }} ==="
          npm audit --json > audit-report.json || true

          # Parse and display results
          cat audit-report.json | jq -r '
            "Total vulnerabilities: \(.metadata.vulnerabilities.total // 0)",
            "Critical: \(.metadata.vulnerabilities.critical // 0)",
            "High: \(.metadata.vulnerabilities.high // 0)",
            "Moderate: \(.metadata.vulnerabilities.moderate // 0)",
            "Low: \(.metadata.vulnerabilities.low // 0)"
          '

          # Check specifically for validator.js
          if grep -q "validator" audit-report.json; then
            echo ""
            echo "⚠️ validator.js vulnerability still present"
            cat audit-report.json | jq -r '.vulnerabilities.validator // empty'
          fi

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: audit-report-${{ matrix.project.name }}
          path: ${{ matrix.project.path }}/audit-report.json
          retention-days: 90

  validator-check:
    name: Check Validator.js Status
    runs-on: ubuntu-latest
    needs: security-audit
    permissions:
      contents: read

    steps:
      - name: Check validator.js advisory status
        run: |
          echo "Checking validator.js advisory GHSA-9965-vmph-33xx..."

          # Check GitHub Advisory Database
          curl -s "https://api.github.com/advisories/GHSA-9965-vmph-33xx" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" | jq -r '
            "Advisory: \(.summary)",
            "Severity: \(.severity)",
            "Published: \(.published_at)",
            "Updated: \(.updated_at)",
            "Patched versions: \(.vulnerabilities[0].patched_versions // "None available")",
            "Vulnerable versions: \(.vulnerabilities[0].vulnerable_version_range)"
          '

      - name: Check class-validator latest version
        run: |
          echo ""
          echo "Checking class-validator latest version..."
          npm view class-validator version dist-tags
          npm view class-validator dependencies.validator

  summary:
    name: Generate Security Summary
    runs-on: ubuntu-latest
    needs: [security-audit, validator-check]
    if: always()
    permissions:
      contents: read
      actions: read

    steps:
      - name: Download all audit reports
        uses: actions/download-artifact@v4
        with:
          path: audit-reports

      - name: Generate summary
        run: |
          echo "# 🔒 Weekly Security Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Audit Results by Project" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          total_vulns=0
          for dir in audit-reports/*/; do
            if [ -f "${dir}audit-report.json" ]; then
              project=$(basename "$dir")
              vulns=$(cat "${dir}audit-report.json" | jq -r '.metadata.vulnerabilities.total // 0')
              total_vulns=$((total_vulns + vulns))

              echo "### ${project}" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              cat "${dir}audit-report.json" | jq -r '
                "Total: \(.metadata.vulnerabilities.total // 0)",
                "Critical: \(.metadata.vulnerabilities.critical // 0)",
                "High: \(.metadata.vulnerabilities.high // 0)",
                "Moderate: \(.metadata.vulnerabilities.moderate // 0)",
                "Low: \(.metadata.vulnerabilities.low // 0)"
              ' >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "**Total vulnerabilities across all projects**: ${total_vulns}" >> $GITHUB_STEP_SUMMARY

          if [ $total_vulns -gt 20 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **Action Required**: Vulnerability count has increased!" >> $GITHUB_STEP_SUMMARY
          elif [ $total_vulns -eq 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **All Clear**: No vulnerabilities detected!" >> $GITHUB_STEP_SUMMARY
          fi

  create-issue:
    name: Create Issue if New Vulnerabilities
    runs-on: ubuntu-latest
    needs: security-audit
    if: failure()
    permissions:
      contents: read
      issues: write

    steps:
      - name: Create Issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = '🔒 New Security Vulnerabilities Detected';
            const body = `
            ## Security Alert

            The weekly security audit has detected changes in vulnerability status.

            **Date**: ${new Date().toISOString()}
            **Workflow Run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ### Action Required

            1. Review the audit reports in the workflow artifacts
            2. Run \`npm audit\` in each affected project
            3. Apply fixes using \`npm audit fix\` or \`npm audit fix --force\`
            4. Update SECURITY_AUDIT_COMPLETE.md with new findings

            ### Projects Monitored

            - Main Project
            - HNH Pool
            - Hybrid Pool
            - Armageddon Pool
            - Orchestration API
            - Mobile App
            - Vendor Portal

            ### Reference

            - [Security Documentation](./SECURITY_AUDIT_COMPLETE.md)
            - [Render Build Fix](./RENDER_BUILD_FIX.md)
            `;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['security', 'automated']
            });
