name: Deploy to Production

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy-render:
    name: Deploy to Render
    uses: ./.github/workflows/deploy-render.yml
    secrets: inherit

  notify:
    name: Deployment Complete
    runs-on: ubuntu-latest
    needs: [deploy-render]
    if: always()

    steps:
      - name: Check deployment results
        run: |
          echo "### 🚀 Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.deploy-render.result }}" = "success" ]; then
            echo "✅ **Render:** Deployed successfully" >> $GITHUB_STEP_SUMMARY
            echo "   - hashnhedge-api" >> $GITHUB_STEP_SUMMARY
            echo "   - hashnhedge-pool" >> $GITHUB_STEP_SUMMARY
            echo "   - hashnhedge-mobile-pool" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Render:** Deployment failed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Services:** https://hashnhedge-api.onrender.com" >> $GITHUB_STEP_SUMMARY
