name: Deploy to All Platforms

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy-render:
    name: Deploy to Render
    uses: ./.github/workflows/deploy-render.yml
    secrets: inherit

  deploy-railway:
    name: Deploy to Railway
    uses: ./.github/workflows/deploy-railway.yml
    secrets: inherit

  notify:
    name: Deployment Complete
    runs-on: ubuntu-latest
    needs: [deploy-render, deploy-railway]
    if: always()

    steps:
      - name: Check deployment results
        run: |
          echo "### 🚀 Multi-Platform Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.deploy-render.result }}" = "success" ]; then
            echo "✅ **Render:** Deployed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Render:** Deployment failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.deploy-railway.result }}" = "success" ]; then
            echo "✅ **Railway:** Deployed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Railway:** Deployment failed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
