[build]
  command = "echo 'Static site - no build needed'"
  functions = "netlify/functions"
  publish = "."

[build.environment]
  NODE_ENV = "production"
  POOL_API_URL = "https://phoneproof-pool.onrender.com"

# Main API Server (Render)
[[redirects]]
  from = "/api/*"
  to = "https://hashnhedge-api.onrender.com/api/:splat"
  status = 200
  force = true
  headers = {X-From = "Netlify"}

# PhoneProof Pool API redirects
[[redirects]]
  from = "/phoneproof-api/*"
  to = "https://phoneproof-pool.onrender.com/api/:splat"
  status = 200
  force = true
  headers = {X-From = "Netlify"}

# Neon Database API (via Stack Auth - legacy)
[[redirects]]
  from = "/db/*"
  to = "/.netlify/functions/neon-db/:splat"
  status = 200

# Static file handling
[[redirects]]
  from = "/armageddon/pool/phoneproof-dashboard.html"
  to = "/armageddon/pool/phoneproof-dashboard.html"
  status = 200

[[redirects]]
  from = "/downloads/*"
  to = "/downloads/:splat"
  status = 200

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "nft"

# Headers for security and CORS
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/phoneproof-api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, X-Device-Type, X-Battery-Level"

[dev]
  command = "npm run dev"
  port = 3001

