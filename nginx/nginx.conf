# HashNHedge Nginx Configuration
# Reverse proxy with Render.com IP whitelisting

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # Render.com outbound IPs (whitelist for backend services)
    geo $render_allowed {
        default 0;

        # Render.com outbound IP addresses
        35.160.120.126 1;
        44.233.151.27 1;
        34.211.200.85 1;
        74.220.48.0/24 1;
        74.220.56.0/24 1;

        # Localhost for testing
        127.0.0.1 1;
        ::1 1;
    }

    # Upstream services
    upstream vendor_portal {
        server vendor-portal:3334;
        keepalive 32;
    }

    upstream mining_pool_api {
        server mining-pool:3335;
        keepalive 32;
    }

    # HTTP to HTTPS redirect
    server {
        listen 80;
        listen [::]:80;
        server_name hashnhedge.com www.hashnhedge.com;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS Main Site
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name hashnhedge.com www.hashnhedge.com;

        # SSL configuration
        ssl_certificate /etc/letsencrypt/live/hashnhedge.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/hashnhedge.com/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/hashnhedge.com/chain.pem;

        # SSL security settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;

        # HSTS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Root directory for static files
        root /var/www/html;
        index index.html;

        # Rate limiting
        limit_req zone=general burst=20 nodelay;
        limit_conn addr 10;

        # Main site static files
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Static assets
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Vendor Portal (public registration)
        location /hnh-vendor-portal/ {
            alias /var/www/html/hnh-vendor-portal/;
            try_files $uri $uri/ /hnh-vendor-portal/index.html;
        }

        # Vendor Portal API (public - for registration)
        location /api/vendor/register {
            limit_req zone=api burst=5 nodelay;

            proxy_pass http://vendor_portal/api/vendor/register;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Vendor Portal Admin API (Render.com IP whitelist ONLY)
        location /api/vendor/ {
            # IP whitelist check
            if ($render_allowed = 0) {
                return 403;
            }

            limit_req zone=api burst=10 nodelay;

            proxy_pass http://vendor_portal/api/vendor/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Mining Pool API (Render.com IP whitelist ONLY)
        location /api/pool/ {
            # IP whitelist check
            if ($render_allowed = 0) {
                return 403;
            }

            limit_req zone=api burst=50 nodelay;

            proxy_pass http://mining_pool_api/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Health check endpoint (public for monitoring)
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Block access to sensitive files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ ~$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Block common exploit attempts
        location ~* (\.git|\.env|\.htaccess|web\.config|composer\.json|package\.json)$ {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # Stratum Mining Server (TCP proxy for port 3333)
    # Note: Stratum uses raw TCP, not HTTP
    # This needs to be configured separately with stream module
}

# Stream configuration for Stratum server (TCP)
stream {
    log_format stratum '$remote_addr [$time_local] $protocol $status $bytes_sent $bytes_received $session_time';

    access_log /var/log/nginx/stratum-access.log stratum;
    error_log /var/log/nginx/stratum-error.log warn;

    # Rate limiting for Stratum connections
    limit_conn_zone $binary_remote_addr zone=stratum_conn:10m;

    upstream stratum_backend {
        server mining-pool:3333;
    }

    server {
        listen 3333;
        listen [::]:3333;

        proxy_pass stratum_backend;
        proxy_connect_timeout 5s;
        proxy_timeout 3600s;

        # Connection limiting
        limit_conn stratum_conn 10;
    }
}
