services:
  - type: web
    name: hashnhedge-pool
    env: node
    plan: free
    rootDir: hybrid-pool
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: STRATUM_PORT
        value: 3333
      - key: STRATUM_HOST
        value: 0.0.0.0
      - key: ADMIN_API_KEY
        generateValue: true
      - key: POOL_FEE_AI
        value: 0.30
      - key: POOL_FEE_MINING
        value: 0.03
      - key: MIN_PAYOUT
        value: 0.01
      - key: DATABASE_URL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: S3_BUCKET_NAME
        value: hashnhedge-pool-backups
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        value: noreply@hashnhedge.com
    autoDeploy: true