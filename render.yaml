services:
  # Main API Server (Unified Backend)
  - type: web
    name: hashnhedge-api
    env: node
    plan: free
    buildCommand: npm run deploy:build
    startCommand: npm run start:unified
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 10000
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_UNPOOLED
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://hashnhedge.com,https://www.hashnhedge.com,http://localhost:3000
      - key: OFFICIAL_WALLET_ADDRESS
        value: GCKbEgD4VSLtkwt57At7pWscaxaQ2gBZtTQE2hqr3Yrc
      - key: SOLANA_NETWORK
        value: mainnet-beta
      - key: ADMIN_API_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: POOL_FEE_AI
        value: 0.30
      - key: POOL_FEE_MINING
        value: 0.03
      - key: MIN_PAYOUT
        value: 0.01
      - key: NEON_API_ENDPOINT
        sync: false
      - key: NEXT_PUBLIC_STACK_PROJECT_ID
        sync: false
      - key: NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY
        sync: false
      - key: STACK_SECRET_SERVER_KEY
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true

  # Hybrid Pool Server (AI/Mining)
  - type: web
    name: hashnhedge-pool
    env: node
    plan: free
    rootDir: hybrid-pool
    buildCommand: npm install --production=false
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: STRATUM_PORT
        value: 3333
      - key: STRATUM_HOST
        value: 0.0.0.0
      - key: ADMIN_API_KEY
        generateValue: true
      - key: POOL_FEE_AI
        value: 0.30
      - key: POOL_FEE_MINING
        value: 0.03
      - key: MIN_PAYOUT
        value: 0.01
      - key: DATABASE_URL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: S3_BUCKET_NAME
        value: hashnhedge-pool-backups
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        value: noreply@hashnhedge.com
    healthCheckPath: /health
    autoDeploy: true

  # Mobile Proof Pool (PhoneProof Mining)
  - type: web
    name: hashnhedge-mobile-pool
    env: node
    plan: free
    rootDir: mobile-proof-pool
    buildCommand: npm install --production=false
    startCommand: node src/mobile-pool-server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: STRATUM_PORT
        value: 3333
      - key: WS_PORT
        value: 8081
      - key: API_PORT
        value: 8080
      - key: PORT
        value: 10000
      - key: POOL_ADDRESS
        sync: false
      - key: POOL_FEE
        value: 2
      - key: MIN_PAYOUT
        value: 0.01
      - key: DATABASE_URL
        sync: false
    healthCheckPath: /api/stats
    autoDeploy: true