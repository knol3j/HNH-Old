<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - HashNHedge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
    <div class="login-card rounded-2xl p-8 w-full max-w-md shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white mb-2">HashNHedge</h1>
            <p class="text-gray-300">Admin Portal</p>
        </div>

        <div id="login-form">
            <div class="mb-6">
                <label class="block text-white mb-2 font-semibold">Username</label>
                <input
                    type="text"
                    id="username"
                    class="w-full px-4 py-3 rounded-lg bg-white bg-opacity-20 text-white placeholder-gray-300 border border-white border-opacity-30 focus:outline-none focus:border-opacity-60"
                    placeholder="Enter username"
                />
            </div>

            <div class="mb-6">
                <label class="block text-white mb-2 font-semibold">Password</label>
                <input
                    type="password"
                    id="password"
                    class="w-full px-4 py-3 rounded-lg bg-white bg-opacity-20 text-white placeholder-gray-300 border border-white border-opacity-30 focus:outline-none focus:border-opacity-60"
                    placeholder="Enter password"
                />
            </div>

            <div id="error-message" class="mb-4 p-3 bg-red-500 bg-opacity-20 border border-red-500 rounded-lg text-red-200 hidden">
                <i class="fas fa-exclamation-circle mr-2"></i>
                <span id="error-text"></span>
            </div>

            <button
                onclick="login()"
                class="w-full bg-white text-purple-900 py-3 rounded-lg font-bold hover:bg-opacity-90 transition transform hover:scale-105"
            >
                <i class="fas fa-sign-in-alt mr-2"></i> Login
            </button>
        </div>

        <div class="mt-6 text-center">
            <a href="../index.html" class="text-white hover:underline">
                <i class="fas fa-arrow-left mr-2"></i> Back to Main Site
            </a>
        </div>
    </div>

    <script>
        // Simple auth - replace with proper backend auth in production
        const ADMIN_CREDENTIALS = {
            username: 'admin',
            password: 'hashnhedge2025'
        };

        function showError(message) {
            document.getElementById('error-text').textContent = message;
            document.getElementById('error-message').classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('error-message').classList.add('hidden');
        }

        function login() {
            hideError();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showError('Please enter username and password');
                return;
            }

            // Simple check - replace with API call to backend
            if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
                // Store auth token
                sessionStorage.setItem('admin_authenticated', 'true');
                sessionStorage.setItem('admin_user', username);

                // Redirect to marketplace
                window.location.href = 'marketplace.html';
            } else {
                showError('Invalid username or password');
            }
        }

        // Allow Enter key to submit
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });

        document.getElementById('username').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
