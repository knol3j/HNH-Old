<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HashNHedge Miner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffffff;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 5px;
        }

        .header p {
            opacity: 0.8;
            font-size: 14px;
        }

        .main-content {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            overflow-y: auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .card h2 {
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            opacity: 0.9;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #ffffff;
            background: rgba(255, 255, 255, 0.15);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-primary {
            background: #4ade80;
            color: #ffffff;
        }

        .btn-primary:hover:not(:disabled) {
            background: #22c55e;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(74, 222, 128, 0.3);
        }

        .btn-danger {
            background: #ef4444;
            color: #ffffff;
        }

        .btn-danger:hover:not(:disabled) {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card .label {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .stat-card .value {
            font-size: 24px;
            font-weight: 700;
        }

        .stat-card.large {
            grid-column: span 2;
        }

        .stat-card.large .value {
            font-size: 32px;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-indicator.active {
            background: #4ade80;
            animation: pulse 2s infinite;
        }

        .status-indicator.inactive {
            background: #ef4444;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .log {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .log-entry {
            margin-bottom: 5px;
            padding: 5px;
            border-left: 3px solid rgba(255, 255, 255, 0.2);
            padding-left: 10px;
        }

        .log-entry.success {
            border-left-color: #4ade80;
        }

        .log-entry.error {
            border-left-color: #ef4444;
        }

        .log-entry.info {
            border-left-color: #3b82f6;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        .full-width {
            grid-column: span 2;
        }

        .mining-animation {
            text-align: center;
            padding: 20px;
            font-size: 48px;
            animation: mining-rotate 2s linear infinite;
        }

        @keyframes mining-rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⛏️ HashNHedge Miner v2.0</h1>
            <p>Decentralized GPU Computing Network</p>
        </div>

        <div class="main-content">
            <!-- Configuration Card -->
            <div class="card">
                <h2>⚙️ Configuration</h2>
                <div class="form-group">
                    <label for="walletAddress">Solana Wallet Address *</label>
                    <input type="text" id="walletAddress" placeholder="7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU">
                </div>
                <div class="form-group">
                    <label for="poolUrl">Pool URL</label>
                    <input type="text" id="poolUrl" placeholder="https://hashnhedge-pool.onrender.com">
                </div>
                <div class="form-group">
                    <label for="workerName">Worker Name</label>
                    <input type="text" id="workerName" placeholder="My Mining Rig">
                </div>
                <button class="btn btn-primary" id="startBtn">🚀 Start Mining</button>
                <button class="btn btn-danger hidden" id="stopBtn">⏹️ Stop Mining</button>
            </div>

            <!-- Status Card -->
            <div class="card">
                <h2>📊 Mining Status</h2>
                <div class="stat-card large">
                    <div class="label">Status</div>
                    <div class="value">
                        <span class="status-indicator inactive" id="statusIndicator"></span>
                        <span id="statusText">Idle</span>
                    </div>
                </div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="label">Hashrate</div>
                        <div class="value" id="hashrate">0 H/s</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Runtime</div>
                        <div class="value" id="runtime">0h 0m 0s</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Accepted Shares</div>
                        <div class="value" id="acceptedShares">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Rejected Shares</div>
                        <div class="value" id="rejectedShares">0</div>
                    </div>
                    <div class="stat-card large">
                        <div class="label">Total Earnings</div>
                        <div class="value" id="earnings">0.00 HNH</div>
                    </div>
                    <div class="stat-card large">
                        <div class="label">Acceptance Rate</div>
                        <div class="value" id="acceptanceRate">0.0%</div>
                    </div>
                </div>
            </div>

            <!-- Activity Log -->
            <div class="card full-width">
                <h2>📜 Activity Log</h2>
                <div class="log" id="activityLog">
                    <div class="log-entry info">Ready to start mining...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
